name: CI
permissions:
  contents: read

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '25'
          cache: 'npm'
      - run: npm ci
      - name: Astro Check
        run: npm run check
      - run: npm run build